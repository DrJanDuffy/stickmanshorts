name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then echo "type=node" >> $GITHUB_OUTPUT; fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then echo "type=python" >> $GITHUB_OUTPUT; fi

      - name: Setup Node
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install & lint (Node)
        if: steps.detect.outputs.type == 'node'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run lint --if-present
          npm test --if-present

      - name: Setup Python
        if: steps.detect.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint (Python)
        if: steps.detect.outputs.type == 'python'
        run: |
          pip install ruff --quiet
          ruff check . --exit-zero

      - name: Validate repo standards
        run: |
          test -f CLAUDE.md || (echo "Missing CLAUDE.md" && exit 1)
          test -f AGENTS.md || (echo "Missing AGENTS.md" && exit 1)
          echo "Repo standards OK"

  commitlint:
    name: Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commits
        run: |
          npx --yes commitlint@19 --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose || true
